version: '3.8'

services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guru-upadesh-ai-service
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - PORT=3002
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-4096}
      - CLAUDE_TEMPERATURE=${CLAUDE_TEMPERATURE:-0.7}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL=${CACHE_TTL:-3600}
    depends_on:
      - redis
    networks:
      - guru-upadesh-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3002/api/v1/ai/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: guru-upadesh-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - guru-upadesh-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
    driver: local

networks:
  guru-upadesh-network:
    driver: bridge
